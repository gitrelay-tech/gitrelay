name: 🐛 Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I reverse-engineer X, I get Y instead of Z.
    validations:
      required: true
  - type: input
    id: repo-url
    attributes:
      label: Repository URL (if relevant)
      placeholder: https://github.com/owner/repo
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Quick
        - Deep Reverse
        - Manual control
        - Not applicable
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Browser:
        - Self-hosted or gitrelay.xyz:
